<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Messaggi Ricevuti - Live</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- PAGINA MESSAGGI: lista in real-time via Socket.io + download PDF -->

  <header>
    <h1>&#128172; Messaggi Ricevuti</h1>
    <p><span id="live-dot"></span>Aggiornamento in tempo reale</p>
  </header>

  <div class="container">

    <!-- Barra azioni -->
    <div class="top-bar">
      <span class="badge" id="msg-count">0 messaggi</span>
      <div class="actions">
        <a href="/api/messages/pdf"
           class="btn btn-secondary"
           style="width:auto;padding:10px 20px;font-size:.9rem">
          &#128196; Scarica PDF
        </a>
              <button onclick="clearMessages()"
          class="btn"
          style="width:auto;padding:10px 20px;font-size:.9rem;background:var(--danger);color:#fff;border:none;border-radius:8px;cursor:pointer;">
          &#128465; Svuota messaggi
        </button>
        <a href="/"
           class="btn btn-secondary"
           style="width:auto;padding:10px 20px;font-size:.9rem">
          &#8592; QR Home
        </a>
      </div>
    </div>

    <!-- Lista messaggi -->
    <div id="msg-list">
      <p style="color:var(--muted);text-align:center;padding:60px 20px">
        Caricamento messaggi...
      </p>
    </div>

  </div>

  <!-- Socket.io: fornito automaticamente dal server Express -->
  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();   // connessione WebSocket al server
    let messages = [];
    let lastCount = 0;     // usato dal polling per rilevare nuovi messaggi

    // Formatta data/ora in italiano
    function fmt(ts) {
      return new Date(ts).toLocaleString('it-IT', {
        dateStyle: 'medium', timeStyle: 'short'
      });
    }

    // Sanifica il testo per prevenire XSS
    function esc(s) {
      return s
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // Costruisce il DOM di un messaggio
    function msgEl(m) {
      const d = document.createElement('div');
      d.className = 'msg-item';
      d.dataset.id = m.id;
      d.innerHTML = '<p>' + esc(m.content) + '</p><time>' + fmt(m.timestamp) + '</time>';
      return d;
    }

    // Aggiorna il contatore
    function updateCount() {
      const n = messages.length;
      document.getElementById('msg-count').textContent = n + (n === 1 ? ' messaggio' : ' messaggi');
    }

    // Carica i messaggi esistenti all'apertura della pagina
    async function loadMessages() {
      try {
        const res = await fetch('/api/messages');
        const data = await res.json();
        messages = data;
        lastCount = messages.length;
        const list = document.getElementById('msg-list');
        list.innerHTML = '';
        if (messages.length === 0) {
          list.innerHTML = '<p style="color:var(--muted);text-align:center;padding:60px 20px">Nessun messaggio ancora. Condividi il QR code!</p>';
        } else {
          messages.forEach(m => list.appendChild(msgEl(m)));
        }
        updateCount();
      } catch(e) {
        document.getElementById('msg-list').innerHTML =
          '<p style="color:var(--danger);text-align:center;padding:40px">Impossibile caricare i messaggi.</p>';
      }
    }

    // Nuovo messaggio in tempo reale via WebSocket
    socket.on('new_message', (m) => {
      messages.unshift(m);
      lastCount = messages.length;
      const list = document.getElementById('msg-list');
      const ph = list.querySelector(':scope > p');
      if (ph) ph.remove();
      list.insertBefore(msgEl(m), list.firstChild);
      updateCount();
    });

    // Alla riconnessione Socket.io ricarica i messaggi (copertura per sleep di Render)
    socket.on('connect', () => {
      console.log('WebSocket connesso');
      loadMessages();
    });

    socket.on('disconnect', () => console.log('WebSocket disconnesso'));

    // Svuota lista in tempo reale
    socket.on('messages_cleared', () => {
      messages = [];
      lastCount = 0;
      document.getElementById('msg-list').innerHTML =
        '<p style="color:var(--muted);text-align:center;padding:60px 20px">Nessun messaggio ancora. Condividi il QR code!</p>';
      updateCount();
    });

    // ---- POLLING DI FALLBACK ogni 5 secondi ----
    // Serve quando il WebSocket non e' disponibile (Render Free, firewall, etc.)
    setInterval(async () => {
      try {
        const res = await fetch('/api/count');
        const data = await res.json();
        if (data.total !== lastCount) {
          // Ci sono messaggi nuovi (o eliminati): ricarica tutto
          loadMessages();
        }
      } catch(e) {
        // ignora errori di rete transitori
      }
    }, 5000);

    // Funzione svuota messaggi
    async function clearMessages() {
      if (!confirm('Sei sicuro di voler eliminare TUTTI i messaggi? Questa azione e\' irreversibile.')) return;
      try {
        const res = await fetch('/api/messages', { method: 'DELETE' });
        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          throw new Error(data.error || 'Risposta server non valida');
        }
      } catch (err) {
        alert('Errore durante l\'eliminazione dei messaggi: ' + err.message);
      }
    }

    // Primo caricamento
    loadMessages();
  </script>
</body>
</html>
